# Docker Compose for reproducing the CFA tutorial manuscript.
# This configuration pulls a pre-built image from Docker Hub.
# No local build step is needed — the image is fully self-contained.

services:
  article:
    # --- Pre-built Image ---
    # Pull the published image from Docker Hub.
    # The build context and Dockerfile are NOT referenced here since we use
    # a pre-built image. If you want to customize the image, you can add:
    #   build:
    #     context: ..
    #     dockerfile: docker/Dockerfile
    image: phdpablo/smart-cfa:4.5.2

    container_name: smart-cfa

    # --- Port Mapping ---
    # Maps port 8787 (RStudio Server) to localhost.
    ports:
      - 127.0.0.1:8787:8787

    # --- Environment Variables ---
    environment:
      - DISABLE_AUTH=true
      - RENV_PATHS_CACHE=/home/rstudio/renv/cache
      - RENV_PATHS_LIBRARY_ROOT=/home/rstudio/renv/library

    # --- Restart Policy ---
    restart: unless-stopped